services:
  backend:
    build: ./back_end
    container_name: quant-backend
    ports:
      - "8000:8000"
    volumes:
      - quant_data:/app/data
    environment:
      - QUANT_ENV=${QUANT_ENV:-production}
      - QUANT_DB_PATH=/app/data/historical/quotes.db
      - QUANT_SESSION_COOKIE_SECURE=${QUANT_SESSION_COOKIE_SECURE:-false}
      - QUANT_ALLOW_SYNTHETIC_DATA=${QUANT_ALLOW_SYNTHETIC_DATA:-false}
      - QUANT_RISK_MAX_ORDER_VOLUME=${QUANT_RISK_MAX_ORDER_VOLUME:-100}
      - QUANT_RISK_MAX_POSITION_VOLUME=${QUANT_RISK_MAX_POSITION_VOLUME:-1000}
      - QUANT_RISK_MAX_DAILY_LOSS_RATIO=${QUANT_RISK_MAX_DAILY_LOSS_RATIO:-0.03}
      - QUANT_RISK_ALLOW_MARKET_ORDERS=${QUANT_RISK_ALLOW_MARKET_ORDERS:-false}
      - QUANT_CTP_BROKER_ID=${QUANT_CTP_BROKER_ID}
      - QUANT_CTP_TD_SERVER=${QUANT_CTP_TD_SERVER}
      - QUANT_CTP_MD_SERVER=${QUANT_CTP_MD_SERVER}
      - QUANT_CTP_APP_ID=${QUANT_CTP_APP_ID}
      - QUANT_CTP_AUTH_CODE=${QUANT_CTP_AUTH_CODE}
      - QUANT_CTP_ENVIRONMENT=${QUANT_CTP_ENVIRONMENT:-æµ‹è¯•}
      - QUANT_CORS_ORIGINS=${QUANT_CORS_ORIGINS:-http://localhost}
      - QUANT_RATE_LIMIT_ENABLED=${QUANT_RATE_LIMIT_ENABLED:-true}
    restart: unless-stopped

  frontend:
    build:
      context: ./front_end
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_BASE_URL: ""
    container_name: quant-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  quant_data:
