# WonderTrader 环境配置
# 文档: https://wondertrader.github.io/docs/

basefiles:
  commodity: config/wt/commodities.json   # 品种信息
  contract:  config/wt/contracts.json     # 合约信息
  holiday:   config/wt/holidays.json      # 节假日
  hot:       config/wt/hots.json          # 主力合约映射（可选）
  session:   config/wt/sessions.json      # 交易时段

data:
  store:
    path: data/wt/                        # 行情数据存储路径

executer:
  active: true
  trader: CTP                             # 与 tdcfg.yaml 中的 id 对应

fees: config/wt/fees.json                 # 手续费配置（可选）
