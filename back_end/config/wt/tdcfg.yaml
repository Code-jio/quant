# WonderTrader CTP 交易通道配置
# 文档: https://wondertrader.github.io/docs/

id: CTP                          # 通道 ID，需与 env.yaml executer.trader 一致

module: TraderCTP                # 交易模块名（wtpy 内置）

ctpsopt:
  front: tcp://114.94.128.1:42205   # 交易前置地址
  broker: "2071"                    # 经纪商 ID
  user: ""                          # 账户（运行时由 connect() 覆盖）
  pass: ""                          # 密码（运行时由 connect() 覆盖）
  appid: client_TraderMaster_v1.0.0
  authcode: ""

