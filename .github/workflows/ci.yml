name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back_end

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: back_end/requirements.txt

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install slowapi pytest pytest-cov

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: mypy src/api/security.py src/trading/risk.py src/data/cache.py src/data/governance.py src/observability.py

      - name: Test
        run: pytest tests/ -v --tb=short
        env:
          QUANT_RATE_LIMIT_ENABLED: "false"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front_end

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front_end/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
